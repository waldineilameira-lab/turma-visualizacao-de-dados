name: 🔒 Validador de PR — Verificação de Escopo

# Usa pull_request_target para ter permissão de comentar em PRs de forks
# sem expor secrets ao código do fork (checkout não é feito da fork).
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [master, main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-scope:
    name: Verificar escopo do PR
    runs-on: ubuntu-latest

    steps:
      - name: Verificar arquivos alterados e permissões
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber  = context.payload.pull_request.number;
            const author    = context.payload.pull_request.user.login;
            const baseSha   = context.payload.pull_request.base.sha;

            console.log(`🔍 Validando PR #${prNumber} de @${author}`);

            // ------------------------------------------------------------------
            // 1. Ler o registro de alunos direto da API (base repo, não fork)
            // ------------------------------------------------------------------
            let registry;
            try {
              const { data: content } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo:  context.repo.repo,
                path:  '.github/students.json',
                ref:   baseSha,
              });
              registry = JSON.parse(Buffer.from(content.content, 'base64').toString('utf8'));
            } catch (err) {
              core.warning(`Não foi possível ler .github/students.json: ${err.message}`);
              core.warning('Validação de escopo ignorada — corrija o arquivo e tente novamente.');
              return;
            }

            // ------------------------------------------------------------------
            // 2. Professor tem acesso total — sem restrições
            // ------------------------------------------------------------------
            if (registry.professor && registry.professor.includes(author)) {
              console.log(`✅ @${author} é professor — acesso total permitido.`);
              return;
            }

            // ------------------------------------------------------------------
            // 3. Listar todos os arquivos alterados no PR (paginado)
            // ------------------------------------------------------------------
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner:      context.repo.owner,
              repo:       context.repo.repo,
              pull_number: prNumber,
              per_page:   100,
            });
            const changedFiles = files.map(f => f.filename);
            console.log(`📝 Arquivos alterados (${changedFiles.length}):\n${changedFiles.join('\n')}`);

            // ------------------------------------------------------------------
            // 4. Localizar o aluno no registro
            // ------------------------------------------------------------------
            const studentEntry = (registry.students || []).find(
              s => s.github && s.github.toLowerCase() === author.toLowerCase()
            );

            if (!studentEntry || !studentEntry.folder) {
              // Aluno não cadastrado
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: prNumber,
                body: [
                  `## ⚠️ Usuário não registrado`,
                  ``,
                  `Olá @${author}! Seu usuário GitHub ainda não está no registro de alunos deste repositório.`,
                  ``,
                  `**O professor @cfneves precisa:**`,
                  `1. Adicionar seu username \`${author}\` ao arquivo \`.github/students.json\``,
                  `2. Associar ao nome da sua pasta em \`alunos/\``,
                  `3. Fazer commit dessa mudança`,
                  ``,
                  `Após o cadastro, feche e reabra este PR (ou adicione um commit) para reativar a verificação.`,
                  ``,
                  `> 🤖 Verificação automática de escopo · [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md)`,
                ].join('\n'),
              });
              core.setFailed(`@${author} não está registrado em .github/students.json. Contate o professor.`);
              return;
            }

            // ------------------------------------------------------------------
            // 5. Verificar se todos os arquivos estão dentro da pasta permitida
            // ------------------------------------------------------------------
            const allowedPrefix = `alunos/${studentEntry.folder}/`;
            const violations = changedFiles.filter(f => !f.startsWith(allowedPrefix));

            if (violations.length === 0) {
              console.log(`✅ @${author}: todos os ${changedFiles.length} arquivo(s) estão em ${allowedPrefix}`);
              return;
            }

            // ------------------------------------------------------------------
            // 6. Reportar violações com mensagem clara
            // ------------------------------------------------------------------
            const violationRows = violations
              .map(f => `| 🚫 | \`${f}\` |`)
              .join('\n');

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: prNumber,
              body: [
                `## 🚫 Arquivos fora da pasta permitida`,
                ``,
                `Olá @${author}! Este PR modifica arquivos **fora da sua pasta pessoal**.`,
                ``,
                `| Status | Caminho |`,
                `|--------|---------|`,
                `| ✅ Permitido | \`${allowedPrefix}\` |`,
                violationRows,
                ``,
                `**Como corrigir:**`,
                `\`\`\`bash`,
                `# 1. Sincronize sua fork com o repositório principal`,
                `git fetch upstream`,
                `git checkout master`,
                `git merge upstream/master`,
                ``,
                `# 2. Crie uma branch nova a partir do master atualizado`,
                `git checkout -b feat/entrega-semana-XX`,
                ``,
                `# 3. Copie apenas os seus arquivos para a nova branch`,
                `# e abra um novo PR`,
                `\`\`\``,
                ``,
                `Consulte o [CONTRIBUTING.md](../blob/master/CONTRIBUTING.md) para o fluxo completo.`,
                ``,
                `> 🤖 Verificação automática de escopo · dúvidas? Mencione @cfneves`,
              ].join('\n'),
            });

            core.setFailed(
              `PR de @${author} contém ${violations.length} arquivo(s) fora de ${allowedPrefix}: ${violations.join(', ')}`
            );
